<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Historique Utilisateur - Le ROC</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- ICONS -->

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{

      --bg:#f7f4ef;

      --white:#ffffff;

      --purple:#6e42b4;
      --purple2:#8c63d9;

      --gold:#d89c1f;
      --gold2:#f1c25b;

      --text:#2c2940;

      --border:#e8dff5;

    }

    body{

      font-family:'Inter',sans-serif;

      background:
      radial-gradient(circle at top right, rgba(140,99,217,.12), transparent 18%),
      linear-gradient(to bottom,#faf8f5,#f4f1ec);

      color:var(--text);

      overflow-x:hidden;

    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .container{

      width:92%;
      max-width:1450px;

      margin:auto;

    }

    /* HERO */

    .hero{

      position:relative;

      overflow:hidden;

      padding:35px 0 60px;

      background:
      linear-gradient(to right, rgba(255,255,255,.96), rgba(255,255,255,.7)),
      url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1600&auto=format&fit=crop') center/cover;

      border-radius:0 0 40px 40px;

      margin-bottom:40px;

    }

    .hero::before{

      content:'';

      position:absolute;
      inset:0;

      background:
      radial-gradient(circle at top right,
      rgba(140,99,217,.25),
      transparent 28%);

    }

    .topbar{

      display:flex;
      justify-content:space-between;
      align-items:center;

      margin-bottom:50px;

      position:relative;
      z-index:2;

      flex-wrap:wrap;
      gap:20px;

    }

    .logo{

      display:flex;
      align-items:center;
      gap:15px;

    }

    .logo i{

      font-size:3.5rem;
      color:var(--gold);

    }

    .logo h2{

      font-size:3rem;
      font-family:'Cinzel',serif;

      line-height:1;

    }

    .logo span{

      display:block;

      font-size:.95rem;

      margin-top:8px;

      letter-spacing:1px;

      color:#6f6a80;

    }

    .back-btn{

      background:white;

      border:1px solid rgba(0,0,0,.06);

      padding:16px 24px;

      border-radius:18px;

      display:flex;
      align-items:center;
      gap:14px;

      box-shadow:0 8px 20px rgba(0,0,0,.05);

      transition:.35s;

      font-weight:700;

    }

    .back-btn:hover{

      transform:translateY(-4px);

    }

    .hero-title{

      position:relative;
      z-index:2;

    }

    .hero-title h1{

      font-size:4.5rem;

      font-family:'Cinzel',serif;

      color:#322b56;

      margin-bottom:20px;

    }

    .hero-title p{

      font-size:1.2rem;

      color:#615b75;

      line-height:1.9;

      max-width:900px;

    }

    /* LIST */

    .history-list{

      display:flex;
      flex-direction:column;
      gap:35px;

      margin-bottom:50px;

    }

    /* CARD */

    .history-card{

      background:white;

      border-radius:34px;

      border:1px solid var(--border);

      overflow:hidden;

      box-shadow:0 12px 30px rgba(0,0,0,.05);

      display:grid;
      grid-template-columns:120px 1fr;

      animation:fadeUp .6s ease;

    }

    .card-side{

      display:flex;
      justify-content:center;
      align-items:flex-start;

      padding-top:35px;

      position:relative;

    }

    .week-side{

      background:
      linear-gradient(to bottom,
      rgba(110,66,180,.92),
      rgba(110,66,180,.45)),

      url('https://images.unsplash.com/photo-1504052434569-70ad5836ab65?q=80&w=1200&auto=format&fit=crop') center/cover;

    }

    .month-side{

      background:
      linear-gradient(to bottom,
      rgba(216,156,31,.88),
      rgba(216,156,31,.38)),

      url('https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=1200&auto=format&fit=crop') center/cover;

    }

    .side-icon{

      width:70px;
      height:70px;

      border-radius:22px;

      background:white;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:2rem;

      box-shadow:0 15px 30px rgba(0,0,0,.18);

      z-index:2;

    }

    .week-side .side-icon{
      color:var(--purple);
    }

    .month-side .side-icon{
      color:var(--gold);
    }

    .card-content{

      padding:35px;

    }

    .card-header{

      display:flex;
      justify-content:space-between;
      align-items:center;

      gap:20px;

      margin-bottom:25px;

      flex-wrap:wrap;

    }

    .card-title h2{

      font-size:2.8rem;

      font-family:'Cinzel',serif;

      margin-bottom:14px;

    }

    .week-title{
      color:#5d35a1;
    }

    .month-title{
      color:#b17a10;
    }

    .card-date{

      width:fit-content;

      padding:12px 18px;

      border-radius:16px;

      display:flex;
      align-items:center;
      gap:12px;

      font-weight:700;

    }

    .week-date{

      background:rgba(110,66,180,.1);
      color:#5d35a1;

    }

    .month-date{

      background:rgba(216,156,31,.12);
      color:#b17a10;

    }

    .card-badge{

      padding:12px 18px;

      border-radius:16px;

      color:white;

      font-weight:700;

      display:flex;
      align-items:center;
      gap:10px;

    }

    .week-badge{

      background:
      linear-gradient(135deg,var(--purple),var(--purple2));

    }

    .month-badge{

      background:
      linear-gradient(135deg,var(--gold),var(--gold2));

    }

    .card-body{

      border:1px solid #ece4f8;

      border-radius:24px;

      padding:25px;

      min-height:250px;
      max-height:360px;

      overflow-y:auto;

      background:#fcfbfe;

      line-height:2;

      font-size:1.1rem;

      white-space:pre-line;

    }

    .card-footer{

      margin-top:20px;

      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:10px;

      color:#756f88;

      font-size:.95rem;

    }

    /* EMPTY */

    .empty-state{

      background:white;

      border-radius:34px;

      border:1px solid var(--border);

      padding:80px 40px;

      text-align:center;

      box-shadow:0 12px 30px rgba(0,0,0,.04);

      animation:fadeUp .5s ease;

    }

    .empty-state i{

      font-size:5rem;

      color:var(--purple);

      margin-bottom:25px;

    }

    .empty-state h2{

      font-size:2.4rem;

      margin-bottom:20px;

      font-family:'Cinzel',serif;

    }

    .empty-state p{

      color:#716b83;

      font-size:1.15rem;

      line-height:1.9;

    }

    /* FOOTER */

    .footer{

      text-align:center;

      padding:35px 0 80px;

      color:#706b81;

    }

    /* ANIMATION */

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* RESPONSIVE */

    @media(max-width:900px){

      .history-card{

        grid-template-columns:1fr;

      }

      .card-side{

        min-height:140px;

      }

      .card-content{

        padding:25px;

      }

      .card-title h2{

        font-size:2rem;

      }

    }

    @media(max-width:650px){

      .hero-title h1{

        font-size:2.8rem;

      }

      .card-header{

        flex-direction:column;
        align-items:flex-start;

      }

      .topbar{

        flex-direction:column;
        align-items:flex-start;

      }

    }

  </style>

</head>

<body>

  <!-- HERO -->

  <header class="hero">

    <div class="container">

      <!-- TOPBAR -->

      <div class="topbar">

        <div class="logo">

          <i class="fa-solid fa-music"></i>

          <div>

            <h2>Le ROC</h2>

            <span>
              HISTORIQUE MUSICAL
            </span>

          </div>

        </div>

        <a href="accueil.html" class="back-btn">

          <i class="fa-solid fa-arrow-left"></i>

          Retour à accueil

        </a>

      </div>

      <!-- TITLE -->

      <div class="hero-title">

        <h1>
          Historique des Répertoires
        </h1>

        <p>
          Retrouvez tous les anciens répertoires publiés automatiquement
          depuis la plateforme musicale Le ROC.
        </p>

      </div>

    </div>

  </header>

  <!-- MAIN -->

  <main class="container">

    <div class="history-list" id="historyContainer">

      <!-- DYNAMIC -->

    </div>

    <!-- FOOTER -->

    <div class="footer">

      © 2026 Le ROC - Historique musical intelligent.

    </div>

  </main>

  <!-- FIREBASE -->

  <script type="module">

    // FIREBASE

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {

      getFirestore,
      collection,
      query,
      orderBy,
      onSnapshot

    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import { getAnalytics }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

    // CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyAHyKVYhNuAuK_yFFtGYmbk2gMIRLV-eKs",
      authDomain: "leroc-bae84.firebaseapp.com",
      databaseURL: "https://leroc-bae84-default-rtdb.firebaseio.com",
      projectId: "leroc-bae84",
      storageBucket: "leroc-bae84.firebasestorage.app",
      messagingSenderId: "603437145590",
      appId: "1:603437145590:web:b914e95570402f3fd1fbd7",
      measurementId: "G-8J3X3YS119"

    };

    // INIT

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // CONTAINER

    const historyContainer =
    document.getElementById('historyContainer');

    // QUERY

    const historyQuery = query(

      collection(db,'historique_repertoires'),
      orderBy('timestamp','desc')

    );

    // REALTIME

    onSnapshot(historyQuery,(snapshot)=>{

      historyContainer.innerHTML = '';

      // EMPTY

      if(snapshot.empty){

        historyContainer.innerHTML = `

          <div class="empty-state">

            <i class="fa-solid fa-music"></i>

            <h2>
              Aucun historique disponible
            </h2>

            <p>
              Les anciens répertoires apparaîtront ici automatiquement.
            </p>

          </div>

        `;

        return;

      }

      // LOOP

      snapshot.forEach((doc)=>{

        const rep = doc.data();

        const isWeek =
        rep.type === 'semaine';

        const card =
        document.createElement('div');

        card.className =
        'history-card';

        card.innerHTML = `

          <!-- SIDE -->

          <div class="card-side ${isWeek ? 'week-side' : 'month-side'}">

            <div class="side-icon">

              <i class="
                fa-regular
                ${isWeek
                  ? 'fa-calendar'
                  : 'fa-calendar-days'}
              "></i>

            </div>

          </div>

          <!-- CONTENT -->

          <div class="card-content">

            <div class="card-header">

              <div class="card-title">

                <h2 class="${isWeek ? 'week-title' : 'month-title'}">

                  ${isWeek
                    ? 'Répertoire de la semaine'
                    : 'Répertoire du mois'}

                </h2>

                <div class="
                  card-date
                  ${isWeek
                    ? 'week-date'
                    : 'month-date'}
                ">

                  <i class="
                    fa-regular
                    ${isWeek
                      ? 'fa-calendar'
                      : 'fa-calendar-days'}
                  "></i>

                  ${rep.date}

                </div>

              </div>

              <div class="
                card-badge
                ${isWeek
                  ? 'week-badge'
                  : 'month-badge'}
              ">

                <i class="
                  fa-regular
                  ${isWeek
                    ? 'fa-calendar'
                    : 'fa-calendar-days'}
                "></i>

                ${isWeek ? 'Semaine' : 'Mois'}

              </div>

            </div>

            <div class="card-body">

              ${rep.contenu || ''}

            </div>

            <div class="card-footer">

              <i class="fa-regular fa-clock"></i>

              Publié à ${rep.heure || '--:--'}

            </div>

          </div>

        `;

        historyContainer.appendChild(card);

      });

    });

  </script>

</body>
</html>
