<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evenements_user - Le ROC</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
radial-gradient(circle at top right,
rgba(217,165,45,.12),
transparent 20%),

linear-gradient(to bottom,
#04050b,
#090d18);

color:white;

overflow-x:hidden;

}

/* NAVBAR */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 35px;

background:rgba(5,8,15,.88);

backdrop-filter:blur(12px);

border-bottom:1px solid rgba(255,255,255,.06);

position:sticky;
top:0;
z-index:999;

}

.logo{

display:flex;
align-items:center;
gap:14px;

}

.logo-icon{

width:58px;
height:58px;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(135deg,
rgba(217,165,45,.25),
rgba(217,165,45,.05));

font-size:2rem;

color:#f5c25b;

}

.logo h1{
font-size:2rem;
}

.logo span{
font-size:.75rem;
letter-spacing:2px;
color:#f5c25b;
}

.nav-links{

display:flex;
align-items:center;
gap:16px;

flex-wrap:wrap;

}

.nav-links a{

text-decoration:none;
color:white;

padding:14px 22px;

border-radius:16px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.05);

display:flex;
align-items:center;
gap:10px;

transition:.35s;

}

.nav-links a:hover{

transform:translateY(-3px);

background:rgba(255,255,255,.08);

}

.nav-links a.active{

background:
linear-gradient(135deg,#d9a52d,#a56f1b);

color:#1d1302;

font-weight:700;

}

/* MAIN */

.main{
padding:30px;
}

/* HERO */

.hero{

background:
linear-gradient(to right,
rgba(8,10,18,.92),
rgba(8,10,18,.45)),

url('https://images.unsplash.com/photo-1501386761578-eac5c94b800a?q=80&w=1600&auto=format&fit=crop') center/cover;

border-radius:35px;

padding:35px;

margin-bottom:30px;

border:1px solid rgba(255,255,255,.06);

overflow:hidden;

}

.hero-title{

display:flex;
align-items:center;
justify-content:space-between;

gap:20px;

flex-wrap:wrap;

}

.hero-left{

display:flex;
align-items:center;
gap:25px;

}

.hero-icon{

width:100px;
height:100px;

border-radius:30px;

background:
linear-gradient(135deg,
rgba(217,165,45,.25),
rgba(217,165,45,.08));

display:flex;
align-items:center;
justify-content:center;

font-size:3rem;

color:#f5c25b;

box-shadow:0 20px 40px rgba(217,165,45,.15);

}

.hero h2{

font-size:3rem;
margin-bottom:12px;

}

.hero p{

color:#c6cada;
font-size:1.08rem;

}

/* BACK BUTTON */

.back-btn{

display:flex;
align-items:center;
gap:12px;

padding:15px 22px;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.06);

color:white;

text-decoration:none;

transition:.35s;

font-weight:600;

}

.back-btn:hover{

transform:translateX(-4px);

background:rgba(255,255,255,.08);

}

/* EVENTS GRID */

.events-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));

gap:28px;

}

/* CARD */

.event-card{

background:
linear-gradient(to bottom,
#0f1320,
#090d18);

border-radius:30px;

overflow:hidden;

border:1px solid rgba(255,255,255,.05);

box-shadow:0 15px 35px rgba(0,0,0,.25);

transition:.4s;

animation:fadeUp .5s ease;

}

.event-card:hover{

transform:translateY(-8px);

box-shadow:0 25px 45px rgba(0,0,0,.35);

}

/* IMAGE */

.event-image{

height:240px;
overflow:hidden;
position:relative;
background:#111;

}

.event-image img{

width:100%;
height:100%;

object-fit:cover;
object-position:center;

display:block;

transition:.5s ease;

border-radius:0;

}

.event-card:hover .event-image img{

transform:scale(1.06);

}

/* CONTENT */

.event-content{

padding:24px;

}

.event-date{

display:inline-flex;
align-items:center;
gap:10px;

padding:10px 14px;

border-radius:14px;

background:rgba(217,165,45,.08);

border:1px solid rgba(217,165,45,.2);

color:#f5c25b;

font-weight:600;

margin-bottom:18px;

}

.event-title{

font-size:1.8rem;
font-weight:700;

margin-bottom:16px;

line-height:1.4;

}

.event-description{

color:#cfd3e4;

line-height:1.8;

font-size:1rem;

}

/* EMPTY */

.empty-box{

padding:45px;

border-radius:30px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.06);

text-align:center;

animation:fadeUp .5s ease;

}

.empty-box i{

font-size:3rem;

color:#f5c25b;

margin-bottom:20px;

}

.empty-box h2{

font-size:2rem;

margin-bottom:12px;

}

/* ANIMATION */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* RESPONSIVE PREMIUM IMAGES */

.event-image{
height:240px;
overflow:hidden;
position:relative;
background:#111;
}

.event-image img{

width:100%;
height:100%;

object-fit:cover;
object-position:center;

display:block;

transition:.5s ease;

border-radius:0;

}

/* HOVER IMAGE */

.event-card:hover .event-image img{

transform:scale(1.06);

}

/* MOBILE RESPONSIVE */

@media(max-width:900px){

.events-grid{

grid-template-columns:1fr;

gap:22px;

}

.event-card{

border-radius:26px;

}

.event-image{

height:220px;

}

}

/* TABLET */

@media(max-width:700px){

.navbar{

flex-direction:column;

gap:18px;

padding:20px;

}

.nav-links{

justify-content:center;

}

.hero{

padding:25px;

}

.hero-title{

flex-direction:column;
align-items:flex-start;

gap:18px;

}

.hero h2{

font-size:2.2rem;

}

.hero p{

font-size:1rem;

}

.event-image{

height:210px;

}

.event-content{

padding:20px;

}

.event-title{

font-size:1.5rem;

}

}

/* PHONE */

@media(max-width:500px){

.main{

padding:16px;

}

.hero{

border-radius:28px;

padding:22px;

}

.hero-icon{

width:78px;
height:78px;

font-size:2rem;

border-radius:24px;

}

.back-btn{

width:100%;

justify-content:center;

}

.nav-links{

gap:10px;

}

.nav-links a{

padding:12px 16px;

font-size:.92rem;

}

.events-grid{

grid-template-columns:1fr;

}

.event-card{

border-radius:24px;

}

.event-image{

height:200px;

}

.event-content{

padding:18px;

}

.event-title{

font-size:1.35rem;

line-height:1.4;

}

.event-description{

font-size:.95rem;

line-height:1.7;

}

}

/* VERY SMALL PHONE */

@media(max-width:380px){

.hero h2{

font-size:1.8rem;

}

.event-image{

height:180px;

}

.event-title{

font-size:1.2rem;

}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">

<div class="logo-icon">
<i class="fa-solid fa-music"></i>
</div>

<div>
<h1>Le ROC</h1>
<span>GROUPE MUSICAL</span>
</div>

</div>

<div class="nav-links">

<a href="accueil.html">
<i class="fa-solid fa-house"></i>
Accueil
</a>

<a href="evenements_user.html" class="active">
<i class="fa-solid fa-calendar"></i>
Événements
</a>

<a href="Membre-user.html">
<i class="fa-solid fa-users"></i>
Membres
</a>

<a href="contact.html">
<i class="fa-regular fa-envelope"></i>
Contact
</a>

</div>

</nav>

<main class="main">

<section class="hero">

<div class="hero-title">

<div class="hero-left">

<div class="hero-icon">
🎉
</div>

<div>

<h2>
Événements Le ROC
</h2>

<p>
Découvrez les événements et activités du groupe.
</p>

</div>

</div>

<a href="accueil.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>
Retour

</a>

</div>

</section>

<div class="events-grid" id="eventsGrid"></div>

</main>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
query,
orderBy,
onSnapshot

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAHyKVYhNuAuK_yFFtGYmbk2gMIRLV-eKs",

authDomain: "leroc-bae84.firebaseapp.com",

projectId: "leroc-bae84",

storageBucket: "leroc-bae84.appspot.com",

messagingSenderId: "603437145590",

appId: "1:603437145590:web:b914e95570402f3fd1fbd7"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const eventsGrid =
document.getElementById('eventsGrid');

const q = query(

collection(db,'evenements'),
orderBy('timestamp','desc')

);

onSnapshot(q,(snapshot)=>{

eventsGrid.innerHTML = '';

if(snapshot.empty){

eventsGrid.innerHTML = `

<div class="empty-box">

<i class="fa-solid fa-calendar-xmark"></i>

<h2>
Aucun événement disponible actuellement.
</h2>

<p>
Les prochains événements du groupe apparaîtront ici.
</p>

</div>

`;

return;

}

snapshot.forEach((doc)=>{

const data = doc.data();

const card =
document.createElement('div');

card.className = 'event-card';

card.innerHTML = `

<div class="event-image">

<img src="${
data.image ||
'https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=1200&auto=format&fit=crop'
}" alt="event">

</div>

<div class="event-content">

<div class="event-date">

<i class="fa-regular fa-calendar"></i>

${data.date || 'Date inconnue'}

</div>

<div class="event-title">

${data.titre || 'Événement'}

</div>

<div class="event-description">

${data.description || 'Aucune description.'}

</div>

</div>

`;

eventsGrid.appendChild(card);

});

});

</script>

</body>
</html>
